name: release

# Builds the ztas-test binary for Linux, Windows and macOS on native runners
# and attaches them to a GitHub Release. Trigger by pushing a tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/update (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: ztas-test-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: ztas-test-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: ztas-test-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: ztas-test-macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Setup Rust
        run: rustup update stable && rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage + hash (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/ztas-test ${{ matrix.asset }}
          if command -v sha256sum >/dev/null; then sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          else shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256; fi
          cat ${{ matrix.asset }}.sha256

      - name: Stage + hash (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/ztas-test.exe ${{ matrix.asset }}
          sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          cat ${{ matrix.asset }}.sha256

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
